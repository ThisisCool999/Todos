<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo App</title>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="7" fill="%23a855f7"/><path d="M9 16.5 L14 21 L23 11" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'>
<style>
  :root {
    --bg: #efede7;
    --surface: #f7f5ef;
    --surface-2: #e8e5dd;
    --border: #d4d1c8;
    --border-strong: #b8b4a8;
    --text: #0a0a0a;
    --text-muted: #6b7280;
    --text-subtle: #9ca3af;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
    --accent-soft: #f3e8ff;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);

    --status-backlog-bg: #f3f4f6;
    --status-backlog-fg: #4b5563;
    --status-progress-bg: #dbeafe;
    --status-progress-fg: #1e40af;
    --status-done-bg: #dcfce7;
    --status-done-fg: #15803d;

    --rank-low-bg: #f9fafb;
    --rank-low-fg: #6b7280;
    --rank-normal-bg: #f3f4f6;
    --rank-normal-fg: #374151;
    --rank-high-bg: #fed7aa;
    --rank-high-fg: #9a3412;
    --rank-urgent-bg: #fee2e2;
    --rank-urgent-fg: #b91c1c;
  }

  body[data-theme="dark"] {
    --bg: #1e1e22;
    --surface: #2a2a30;
    --surface-2: #34343b;
    --border: #46464c;
    --border-strong: #5a5a64;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --text-subtle: #71717a;
    --accent: #8b5cf6;
    --accent-hover: #a78bfa;
    --accent-soft: #2e1065;
    --status-backlog-bg: #27272a;
    --status-backlog-fg: #d4d4d8;
    --status-progress-bg: #1e3a8a;
    --status-progress-fg: #bfdbfe;
    --status-done-bg: #14532d;
    --status-done-fg: #bbf7d0;
    --rank-low-bg: #18181b;
    --rank-low-fg: #a1a1aa;
    --rank-normal-bg: #27272a;
    --rank-normal-fg: #e4e4e7;
    --rank-high-bg: #7c2d12;
    --rank-high-fg: #fed7aa;
    --rank-urgent-bg: #7f1d1d;
    --rank-urgent-fg: #fecaca;
  }

  body[data-theme="sepia"] {
    --bg: #f0e7cd;
    --surface: #f5edd5;
    --surface-2: #e7dcb6;
    --border: #d2c69e;
    --border-strong: #b3a583;
    --text: #2c2312;
    --text-muted: #635237;
    --text-subtle: #907e5d;
    --accent: #8d5318;
    --accent-hover: #6c3e10;
    --accent-soft: #efddae;
  }

  body[data-theme="slate"] {
    --bg: #182549;
    --surface: #1f2f5e;
    --surface-2: #29396f;
    --border: #3a4d85;
    --border-strong: #4d62a0;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-subtle: #64748b;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --accent-soft: #312e81;
    --status-backlog-bg: #334155;
    --status-backlog-fg: #cbd5e1;
    --status-progress-bg: #1e3a8a;
    --status-progress-fg: #bfdbfe;
    --status-done-bg: #14532d;
    --status-done-fg: #bbf7d0;
    --rank-low-bg: #2a3548;
    --rank-low-fg: #94a3b8;
    --rank-normal-bg: #334155;
    --rank-normal-fg: #e2e8f0;
    --rank-high-bg: #7c2d12;
    --rank-high-fg: #fed7aa;
    --rank-urgent-bg: #7f1d1d;
    --rank-urgent-fg: #fecaca;
  }

  body[data-theme="cosmos"] {
    --bg: #000008;
    --surface: rgba(15, 18, 35, 0.32);
    --surface-2: rgba(28, 32, 60, 0.45);
    --border: rgba(255, 255, 255, 0.04);
    --border-strong: rgba(255, 255, 255, 0.15);
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-subtle: #64748b;
    --accent: #a855f7;
    --accent-hover: #c084fc;
    --accent-soft: rgba(168, 85, 247, 0.18);
    --status-backlog-bg: rgba(255, 255, 255, 0.08);
    --status-backlog-fg: #cbd5e1;
    --status-progress-bg: rgba(99, 102, 241, 0.32);
    --status-progress-fg: #c7d2fe;
    --status-done-bg: rgba(34, 197, 94, 0.25);
    --status-done-fg: #86efac;
    --rank-low-bg: rgba(255, 255, 255, 0.05);
    --rank-low-fg: #94a3b8;
    --rank-normal-bg: rgba(255, 255, 255, 0.1);
    --rank-normal-fg: #e2e8f0;
    --rank-high-bg: rgba(245, 158, 11, 0.25);
    --rank-high-fg: #fcd34d;
    --rank-urgent-bg: rgba(239, 68, 68, 0.28);
    --rank-urgent-fg: #fca5a5;
  }
  body[data-theme="cosmos"] .card,
  body[data-theme="cosmos"] .stats-bar,
  body[data-theme="cosmos"] .anim-section,
  body[data-theme="cosmos"] .daily-list,
  body[data-theme="cosmos"] .daily-row,
  body[data-theme="cosmos"] .todo-item,
  body[data-theme="cosmos"] .note-item,
  body[data-theme="cosmos"] .filter-bar,
  body[data-theme="cosmos"] input[type="text"],
  body[data-theme="cosmos"] input[type="datetime-local"],
  body[data-theme="cosmos"] textarea,
  body[data-theme="cosmos"] select,
  body[data-theme="cosmos"] .theme-trigger,
  body[data-theme="cosmos"] .theme-menu,
  body[data-theme="cosmos"] .book {
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  #bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    opacity: 1;
    transition: opacity 0.35s ease;
  }
  body { position: relative; }
  .app { position: relative; z-index: 1; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
    transition: background-color 0.4s ease, color 0.4s ease;
  }

  .app {
    max-width: 880px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ========== Header ========== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 2.1rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .theme-wrap { position: relative; }

  .theme-trigger {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s ease, background-color 0.2s ease;
  }
  .theme-trigger:hover { border-color: var(--border-strong); background: var(--surface-2); }

  .theme-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    padding: 6px;
    min-width: 160px;
    z-index: 10;
    opacity: 0;
    transform: translateY(-4px);
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .theme-menu.open { opacity: 1; transform: translateY(0); pointer-events: auto; }

  .theme-option {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 8px 10px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 0.875rem;
    cursor: pointer;
    border-radius: 6px;
    text-align: left;
    transition: background-color 0.15s ease;
  }
  .theme-option:hover { background: var(--surface-2); }
  .theme-option.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
  .theme-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    flex-shrink: 0;
  }

  /* ========== Cards ========== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    transition: border-color 0.2s ease;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  h2 {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .meta-text {
    font-size: 0.825rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ========== Form ========== */
  .form-group { display: flex; flex-direction: column; gap: 12px; }

  label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: block;
  }

  input[type="text"],
  input[type="datetime-local"],
  textarea,
  select {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  input::placeholder, textarea::placeholder { color: var(--text-subtle); }
  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  input[type="datetime-local"] { color-scheme: light; }
  body[data-theme="dark"] input[type="datetime-local"],
  body[data-theme="slate"] input[type="datetime-local"] { color-scheme: dark; }

  textarea { resize: vertical; min-height: 70px; }
  select { cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='gray' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }

  .form-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .btn-ghost.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .checkbox-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    user-select: none;
    color: var(--text);
    transition: background-color 0.15s ease, border-color 0.15s ease;
  }
  .checkbox-pill:hover { background: var(--surface-2); }
  .checkbox-pill.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  .checkbox-pill input { display: none; }

  /* ========== Daily Routine ========== */
  .daily-list {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .daily-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    transition: background-color 0.15s ease;
  }
  .daily-row + .daily-row { border-top: 1px solid var(--border); }
  .daily-row:hover { background: var(--surface-2); }

  .daily-icon {
    font-size: 1.05rem;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface-2);
    border-radius: 8px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .daily-row:hover .daily-icon { background: var(--surface); }

  .daily-row-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .daily-row-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .daily-row-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .external-link {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: color 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .external-link:hover { color: var(--accent); background: var(--accent-soft); border-color: var(--accent); }

  .daily-tasks {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .daily-task {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background-color 0.15s ease, border-color 0.15s ease;
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .daily-task:hover { border-color: var(--border-strong); }
  .daily-task.checked {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .daily-task.checked .daily-task-label {
    text-decoration: line-through;
    color: var(--text-subtle);
  }

  .checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background-color 0.15s ease, border-color 0.15s ease;
    background: var(--surface);
  }
  .checkbox:hover { border-color: var(--accent); }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox.checked::after {
    content: '';
    width: 10px;
    height: 6px;
    border-left: 1.8px solid white;
    border-bottom: 1.8px solid white;
    transform: rotate(-45deg) translateY(-1px);
    animation: checkDraw 0.2s ease;
  }
  @keyframes checkDraw {
    from { opacity: 0; transform: rotate(-45deg) translateY(-1px) scale(0.5); }
    to { opacity: 1; transform: rotate(-45deg) translateY(-1px) scale(1); }
  }

  .daily-add-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
    padding: 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .daily-add-row {
    display: grid;
    grid-template-columns: 1fr 120px;
    gap: 8px;
  }
  .daily-add-form input {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.875rem;
    outline: none;
    font-family: inherit;
    width: 100%;
  }
  .daily-add-form input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .daily-add-form button { font-size: 0.85rem; padding: 8px 16px; align-self: flex-start; }
  .daily-row-delete {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
    flex-shrink: 0;
  }
  .daily-row-delete:hover { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
  @media (max-width: 600px) {
    .daily-add-form { grid-template-columns: 1fr; }
  }

  /* ========== AoPS Books ========== */
  .books-section {
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 4px;
  }
  .books-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-subtle);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .books-list { display: flex; flex-direction: column; gap: 6px; }
  .book {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 0.85rem;
    transition: border-color 0.2s ease, background-color 0.2s ease;
  }
  .book:hover { border-color: var(--border-strong); }
  .book.current {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .book.finished { opacity: 0.55; }
  .book.finished .book-name { text-decoration: line-through; }
  .book-name { font-weight: 500; }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .pill.status-backlog { background: var(--status-backlog-bg); color: var(--status-backlog-fg); }
  .pill.status-progress { background: var(--status-progress-bg); color: var(--status-progress-fg); }
  .pill.status-done { background: var(--status-done-bg); color: var(--status-done-fg); }
  .pill.rank-low { background: var(--rank-low-bg); color: var(--rank-low-fg); }
  .pill.rank-normal { background: var(--rank-normal-bg); color: var(--rank-normal-fg); }
  .pill.rank-high { background: var(--rank-high-bg); color: var(--rank-high-fg); }
  .pill.rank-urgent { background: var(--rank-urgent-bg); color: var(--rank-urgent-fg); }

  .book-action {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
  }
  .book-action:hover { color: var(--accent); border-color: var(--accent); }
  .book.current .book-action {
    border-color: var(--accent);
    color: var(--accent);
  }
  .book.current .book-action:hover { background: var(--accent); color: white; }

  /* ========== Todo List ========== */
  .todo-list { display: flex; flex-direction: column; gap: 10px; }

  .todo-item {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.2s ease, background-color 0.2s ease;
  }
  .todo-item:hover { border-color: var(--border-strong); }
  .todo-item.new { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .todo-item.removing { animation: fadeOut 0.25s ease forwards; }
  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(20px); max-height: 0; padding-top: 0; padding-bottom: 0; margin-bottom: 0; border-width: 0; }
  }
  .todo-item.overdue { border-color: #fca5a5; }

  .todo-checkbox-wrap { padding-top: 1px; }

  .todo-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }

  .todo-title {
    font-size: 0.98rem;
    font-weight: 600;
    color: var(--text);
    word-break: break-word;
  }
  .todo-item.completed .todo-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .todo-description {
    font-size: 0.86rem;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .todo-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .meta-divider { color: var(--text-subtle); }

  .due-text { display: inline-flex; align-items: center; gap: 4px; }
  .due-text.overdue { color: #b91c1c; font-weight: 600; }
  .due-text.due-soon { color: #b45309; font-weight: 600; }

  .delete-btn {
    background: transparent;
    border: none;
    color: var(--text-subtle);
    font-size: 1rem;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.15s ease, color 0.15s ease;
    flex-shrink: 0;
  }
  .delete-btn:hover { background: #fef2f2; color: #dc2626; }
  body[data-theme="dark"] .delete-btn:hover, body[data-theme="slate"] .delete-btn:hover { background: #450a0a; color: #fca5a5; }

  /* ========== Empty States ========== */
  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .empty-state .icon {
    font-size: 1.8rem;
    display: block;
    margin-bottom: 8px;
    opacity: 0.6;
  }

  /* ========== Notes ========== */
  .note-input-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    margin-bottom: 16px;
    align-items: start;
  }
  .notes-list { display: flex; flex-direction: column; gap: 10px; }
  .note-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    align-items: start;
    transition: border-color 0.2s ease;
  }
  .note-item:hover { border-color: var(--border-strong); }
  .note-item.new { animation: fadeIn 0.3s ease; }
  .note-item.removing { animation: fadeOut 0.25s ease forwards; }
  .note-text { font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; }
  .note-time { font-size: 0.75rem; color: var(--text-subtle); margin-top: 4px; }

  /* ========== Stats Bar ========== */
  .stats-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.85rem;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .stat-value { color: var(--text); font-weight: 600; font-size: 0.95rem; }

  /* ========== Filters ========== */
  .filter-bar {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: fit-content;
  }
  .filter-btn {
    padding: 5px 12px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: background-color 0.15s ease, color 0.15s ease;
    font-family: inherit;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .filter-count {
    margin-left: 4px;
    font-size: 0.72rem;
    color: var(--text-subtle);
  }
  .filter-btn.active .filter-count { color: var(--text-muted); }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  /* ========== Animation Generator ========== */
  .anim-section {
    background: transparent;
    border: none;
    border-radius: 0;
    overflow: visible;
    padding: 0;
  }
  .anim-header {
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  body[data-theme="cosmos"] .anim-header {
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .anim-controls { display: flex; gap: 8px; align-items: center; }
  .anim-controls select { width: auto; min-width: 200px; padding: 8px 30px 8px 12px; font-size: 0.875rem; }
  .anim-track {
    height: 300vh;
    position: relative;
    background: transparent;
    width: 100vw;
    margin-left: calc(-50vw + 50%);
    margin-right: calc(-50vw + 50%);
  }
  .anim-stage {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    background: transparent;
  }
  body { overflow-x: hidden; }
  .anim-stage canvas { display: block; width: 100%; height: 100%; }
  .anim-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    pointer-events: none;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    transition: opacity 0.4s ease;
  }
  .anim-hint::after {
    content: '↓';
    display: block;
    font-size: 1.4rem;
    margin-top: 6px;
    animation: hintBounce 1.6s ease-in-out infinite;
  }
  @keyframes hintBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }
  .anim-hint.hidden { opacity: 0; }
  .anim-progress {
    position: absolute;
    top: 16px;
    right: 16px;
    color: rgba(255,255,255,0.85);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    pointer-events: none;
  }

  /* ========== Celebration ========== */
  .celebration {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: celebFadeIn 0.4s ease;
  }
  .celebration.hidden { display: none; }
  @keyframes celebFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .confetti-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .celebration-card {
    position: relative;
    z-index: 1;
    background: rgba(15, 18, 35, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 18px;
    padding: 40px 56px;
    text-align: center;
    color: #f1f5f9;
    box-shadow: 0 24px 60px rgba(168, 85, 247, 0.25), 0 0 0 1px rgba(255,255,255,0.05);
    max-width: 460px;
    animation: celebPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes celebPop {
    from { transform: scale(0.7) translateY(20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }
  .celebration-icon {
    font-size: 4.5rem;
    margin-bottom: 8px;
    animation: celebBounce 1s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes celebBounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }
  .celebration-title {
    font-size: 1.9rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a855f7, #06b6d4, #facc15);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .celebration-msg {
    font-size: 1.05rem;
    color: #e2e8f0;
    margin-bottom: 4px;
  }
  .celebration-sub {
    font-size: 0.85rem;
    color: #94a3b8;
    margin-bottom: 24px;
  }
  #celebrationClose { padding: 10px 28px; }

  /* ========== Shake ========== */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.3s; border-color: #fca5a5 !important; }

  /* ========== Mobile ========== */
  @media (max-width: 700px) {
    .app { padding: 24px 16px 60px; }
    h1 { font-size: 1.7rem; }
    .form-row { grid-template-columns: 1fr; }
    .daily-grid { grid-template-columns: 1fr; }
    .note-input-row { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .filter-bar { width: 100%; }
    .filter-btn { flex: 1; text-align: center; }
  }
</style>
</head>
<body data-theme="cosmos">
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <div class="app">
    <!-- ============ HEADER ============ -->
    <header>
      <h1>Todo App</h1>
      <div class="theme-wrap">
        <button class="theme-trigger" id="themeTrigger">
          <span class="theme-dot" id="themeDot"></span>
          <span id="themeName">Light</span>
        </button>
        <div class="theme-menu" id="themeMenu"></div>
      </div>
    </header>

    <!-- ============ STATS ============ -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Today</span>
        <span class="stat-value" id="todayDate">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Daily Routine</span>
        <span class="stat-value" id="dailyProgress">0/5</span>
      </div>
      <div class="stat">
        <span class="stat-label">Active Tasks</span>
        <span class="stat-value" id="activeCount">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Completion</span>
        <span class="stat-value" id="completionRate">0%</span>
      </div>
    </div>

    <!-- ============ DAILY ROUTINE ============ -->
    <section class="card">
      <div class="card-header">
        <h2>Daily Routine</h2>
        <span class="meta-text">Auto-resets at midnight</span>
      </div>
      <div class="daily-list" id="dailyList"></div>
      <div class="daily-add-form">
        <div class="daily-add-row">
          <input type="text" id="newDailyTitle" placeholder="Custom task name (e.g. Reading)" maxlength="60">
          <input type="text" id="newDailyLabel" placeholder="30 min" maxlength="20">
        </div>
        <input type="text" id="newDailyDesc" placeholder="Description (optional)" maxlength="120">
        <input type="url" id="newDailyUrl" placeholder="URL (optional, e.g. https://...)" maxlength="200">
        <button class="btn btn-primary" id="newDailyAdd">+ Add Daily Task</button>
      </div>
      <div class="books-section" id="booksSection"></div>
    </section>

    <!-- ============ ANIMATION GENERATOR ============ -->
    <section class="anim-section">
      <div class="anim-header">
        <h2>🎬 Animation Generator</h2>
        <div class="anim-controls">
          <button class="btn btn-ghost" id="animEnable">Animation: On</button>
          <select id="animSelect"></select>
          <button class="btn btn-ghost" id="animRandom">🎲 Random</button>
        </div>
      </div>
      <div class="anim-track" id="animTrack">
        <div class="anim-stage" id="animStage">
          <canvas id="animCanvas"></canvas>
        </div>
      </div>
    </section>

    <!-- ============ ADD TODO ============ -->
    <section class="card">
      <div class="card-header"><h2>Add Todo</h2></div>
      <div class="form-group">
        <input type="text" id="todoInput" placeholder="What needs to be done?" maxlength="200">
        <textarea id="descInput" placeholder="Description (optional)" rows="2" maxlength="500"></textarea>
        <div class="form-row">
          <div>
            <label for="dueInput">Due Time</label>
            <input type="datetime-local" id="dueInput">
          </div>
          <div>
            <label for="statusSelect">Status</label>
            <select id="statusSelect">
              <option value="backlog">Backlog</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div>
            <label for="rankSelect">Rank</label>
            <select id="rankSelect">
              <option value="low">Low</option>
              <option value="normal" selected>Normal</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="addBtn">Add</button>
          <label class="checkbox-pill" id="recurringToggle">
            <input type="checkbox" id="recurringInput">
            <span>Daily recurring</span>
          </label>
        </div>
      </div>
    </section>

    <!-- ============ TASKS ============ -->
    <section>
      <div class="toolbar">
        <h2>Tasks</h2>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All <span class="filter-count" id="countAll">0</span></button>
          <button class="filter-btn" data-filter="active">Active <span class="filter-count" id="countActive">0</span></button>
          <button class="filter-btn" data-filter="completed">Completed <span class="filter-count" id="countCompleted">0</span></button>
          <button class="filter-btn" data-filter="recurring">Recurring <span class="filter-count" id="countRecurring">0</span></button>
        </div>
      </div>
      <ul class="todo-list" id="todoList"></ul>
      <div style="margin-top:12px;text-align:right;">
        <button class="btn btn-ghost" id="clearBtn">Clear completed</button>
      </div>
    </section>

    <!-- ============ NOTES ============ -->
    <section class="card">
      <div class="card-header"><h2>Notes</h2></div>
      <div class="note-input-row">
        <textarea class="" id="noteInput" placeholder="Jot down a thought..." rows="2"></textarea>
        <button class="btn btn-primary" id="addNoteBtn">Save</button>
      </div>
      <div class="notes-list" id="notesList"></div>
    </section>
  </div>

  <!-- Celebration overlay (shown when daily routine fully completed) -->
  <div class="celebration hidden" id="celebration">
    <canvas class="confetti-canvas" id="confettiCanvas"></canvas>
    <div class="celebration-card">
      <div class="celebration-icon">🎉</div>
      <h2 class="celebration-title">Congratulations!</h2>
      <p class="celebration-msg">You crushed your entire daily routine.</p>
      <p class="celebration-sub">Web Dev · Vocab · USACO · AoPS — all done.</p>
      <button class="btn btn-primary" id="celebrationClose">Awesome ✨</button>
    </div>
  </div>

  <script>
    /* ============ STATE ============ */
    const STORAGE_KEY = 'todoApp.state.v4';

    const defaultDaily = () => ({
      webDev: { completed: false },
      vocab: [{ completed: false }, { completed: false }],
      usaco: { completed: false },
      aopsTime: { completed: false },
      custom: []
    });
    const defaultBooks = [
      { id: 'algebra', name: 'Intro to Algebra' },
      { id: 'counting', name: 'Intro to Counting & Probability' },
      { id: 'geometry', name: 'Intro to Geometry' },
      { id: 'numbertheory', name: 'Intro to Number Theory' }
    ];

    let state = {
      daily: defaultDaily(),
      books: defaultBooks.map((b, i) => ({ ...b, status: i === 0 ? 'current' : 'waitlisted' })),
      customTodos: [],
      notes: [],
      theme: 'cosmos',
      filter: 'all',
      lastReset: '',
      animScene: 'rocket',
      cosmosMigrated: false,
      randomAuto: false,
      animEnabled: true,
      lastCelebrated: ''
    };

    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved) {
        state = { ...state, ...saved, daily: { ...defaultDaily(), ...(saved.daily || {}) } };
        if (!Array.isArray(state.daily.vocab) || state.daily.vocab.length !== 2) {
          state.daily.vocab = [{ completed: false }, { completed: false }];
        }
        if (!Array.isArray(state.daily.custom)) {
          state.daily.custom = [];
        }
        if (!Array.isArray(state.books) || state.books.length === 0) {
          state.books = defaultBooks.map((b, i) => ({ ...b, status: i === 0 ? 'current' : 'waitlisted' }));
        }
        if (!state.cosmosMigrated) {
          state.theme = 'cosmos';
          state.cosmosMigrated = true;
        }
        if (state.animScene === 'mountain') state.animScene = 'astronaut';
        if (state.animScene === 'skyscraper') state.animScene = 'ufo';
      }
    } catch (e) {}

    const seenTodoIds = new Set(state.customTodos.map(t => t.id));
    const seenNoteIds = new Set(state.notes.map(n => n.id));

    const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    /* ============ DAILY RESET ============ */
    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };
    function applyDailyReset() {
      const today = todayStr();
      if (state.lastReset !== today) {
        state.daily.webDev.completed = false;
        state.daily.vocab.forEach(v => v.completed = false);
        state.daily.usaco.completed = false;
        state.daily.aopsTime.completed = false;
        (state.daily.custom || []).forEach(c => { c.completed = false; });
        state.customTodos.forEach(t => {
          if (t.recurring) {
            t.completed = false;
            if (t.status === 'done') t.status = 'backlog';
          }
        });
        state.lastReset = today;
        save();
      }
    }

    /* ============ THEMES ============ */
    const THEMES = [
      { id: 'cosmos', name: 'Cosmos', dot: 'radial-gradient(circle, #a855f7, #000008)' },
      { id: 'light', name: 'Light', dot: '#ffffff' },
      { id: 'dark', name: 'Dark', dot: '#0a0a0a' },
      { id: 'sepia', name: 'Sepia', dot: '#f7f1e3' },
      { id: 'slate', name: 'Slate', dot: '#1e293b' }
    ];

    const themeTrigger = document.getElementById('themeTrigger');
    const themeMenu = document.getElementById('themeMenu');
    const themeDot = document.getElementById('themeDot');
    const themeName = document.getElementById('themeName');

    function renderThemeMenu() {
      themeMenu.innerHTML = '';
      THEMES.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'theme-option' + (state.theme === t.id ? ' active' : '');
        btn.innerHTML = `<span class="theme-dot" style="background:${t.dot}"></span><span>${t.name}</span>`;
        btn.addEventListener('click', () => {
          // Smoothly fade canvas, swap theme + palette, fade back in
          const bgEl = document.getElementById('bgCanvas');
          if (bgEl) bgEl.style.opacity = '0';
          setTimeout(() => {
            state.theme = t.id;
            document.body.dataset.theme = t.id;
            save();
            updateThemeTrigger();
            renderThemeMenu();
            if (typeof BgStars !== 'undefined') {
              BgStars.applyPalette();
              BgStars.resize();
            }
            if (bgEl) bgEl.style.opacity = '1';
          }, 350);
          themeMenu.classList.remove('open');
        });
        themeMenu.appendChild(btn);
      });
    }
    function updateThemeTrigger() {
      const t = THEMES.find(x => x.id === state.theme) || THEMES[0];
      themeDot.style.background = t.dot;
      themeName.textContent = t.name;
    }
    themeTrigger.addEventListener('click', e => {
      e.stopPropagation();
      themeMenu.classList.toggle('open');
    });
    document.addEventListener('click', () => themeMenu.classList.remove('open'));

    /* ============ DAILY ROUTINE ============ */
    function renderDaily() {
      const list = document.getElementById('dailyList');
      list.innerHTML = '';
      const rows = [
        { icon: '💻', title: 'Web Development', sub: '30 minutes daily',
          link: { url: 'https://cs50.harvard.edu/x/', label: 'CS50 ↗' },
          tasks: [{ label: '30 min', ref: state.daily.webDev }] },
        { icon: '📚', title: 'Vocab Studying', sub: 'Two 15-minute sessions',
          link: { url: 'https://membean.com', label: 'Membean ↗' },
          tasks: [
            { label: '15 min', ref: state.daily.vocab[0] },
            { label: '15 min', ref: state.daily.vocab[1] }
          ] },
        { icon: '🏆', title: 'USACO Training', sub: '1 hour daily',
          link: { url: 'https://usaco.guide', label: 'usaco.guide ↗' },
          tasks: [{ label: '1 hour', ref: state.daily.usaco }] },
        { icon: '🧮', title: 'AoPS Math', sub: '1 hour daily',
          link: { url: 'https://artofproblemsolving.com', label: 'AoPS ↗' },
          tasks: [{ label: '1 hour', ref: state.daily.aopsTime }] }
      ];
      rows.forEach(r => {
        const row = document.createElement('div');
        row.className = 'daily-row';

        const icon = document.createElement('span');
        icon.className = 'daily-icon';
        icon.textContent = r.icon;
        row.appendChild(icon);

        const info = document.createElement('div');
        info.className = 'daily-row-info';
        const title = document.createElement('span');
        title.className = 'daily-row-title';
        title.textContent = r.title;
        const sub = document.createElement('span');
        sub.className = 'daily-row-sub';
        sub.textContent = r.sub;
        info.appendChild(title);
        info.appendChild(sub);
        row.appendChild(info);

        if (r.link) {
          const a = document.createElement('a');
          a.href = r.link.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = 'external-link';
          a.textContent = r.link.label;
          row.appendChild(a);
        } else {
          row.appendChild(document.createElement('span'));
        }

        const tasks = document.createElement('div');
        tasks.className = 'daily-tasks';
        r.tasks.forEach(t => {
          const tBtn = document.createElement('div');
          tBtn.className = 'daily-task' + (t.ref.completed ? ' checked' : '');
          const cb = document.createElement('div');
          cb.className = 'checkbox' + (t.ref.completed ? ' checked' : '');
          const label = document.createElement('span');
          label.className = 'daily-task-label';
          label.textContent = t.label;
          tBtn.addEventListener('click', () => {
            t.ref.completed = !t.ref.completed;
            save();
            renderDaily();
            updateStats();

    function formatDue(iso) {
      if (!iso) return null;
      const d = new Date(iso);
      const sameDay = d.toDateString() === new Date().toDateString();
      const opts = sameDay
        ? { hour: 'numeric', minute: '2-digit' }
        : { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
      return d.toLocaleString(undefined, opts);
    }
    function dueStatus(iso, completed) {
      if (!iso || completed) return null;
      const diff = new Date(iso).getTime() - Date.now();
      if (diff < 0) return 'overdue';
      if (diff < 1000 * 60 * 60 * 6) return 'due-soon';
      return 'normal';
    }
    const STATUS_LABEL = { backlog: 'Backlog', in_progress: 'In Progress', done: 'Done' };
    const RANK_LABEL = { low: 'Low', normal: 'Normal', high: 'High', urgent: 'Urgent' };

    function renderTodos() {
      const filter = state.filter;

        if (filter === 'active') return !t.completed;
        if (filter === 'completed') return t.completed;
        if (filter === 'recurring') return t.recurring;
        return true;
      });

      todoList.innerHTML = '';
      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        const msg = filter === 'completed' ? 'No completed tasks'
          : filter === 'active' ? 'No active tasks — all caught up.'
          : filter === 'recurring' ? 'No recurring tasks set up'
          : 'No tasks yet — add one above.';
        empty.innerHTML = `<span class="icon">○</span>${msg}`;
        todoList.appendChild(empty);
      } else {
        filtered.forEach(todo => {
          const li = document.createElement('li');
          const ds = dueStatus(todo.due, todo.completed);
          const isNew = !seenTodoIds.has(todo.id);
          if (isNew) seenTodoIds.add(todo.id);

          li.className = 'todo-item'
            + (todo.completed ? ' completed' : '')
            + (ds === 'overdue' ? ' overdue' : '')
            + (isNew ? ' new' : '');
          li.dataset.id = todo.id;

          const cbWrap = document.createElement('div');
          cbWrap.className = 'todo-checkbox-wrap';
          const cb = document.createElement('div');
          cb.className = 'checkbox' + (todo.completed ? ' checked' : '');
          cb.addEventListener('click', () => toggleTodo(todo.id));
          cbWrap.appendChild(cb);
          li.appendChild(cbWrap);

          const body = document.createElement('div');
          body.className = 'todo-body';

          const title = document.createElement('div');
          title.className = 'todo-title';
          title.textContent = todo.text;
          body.appendChild(title);

          if (todo.description) {
            const desc = document.createElement('div');
            desc.className = 'todo-description';
            desc.textContent = todo.description;
            body.appendChild(desc);
          }

          const meta = document.createElement('div');
          meta.className = 'todo-meta';

          const status = todo.status || (todo.completed ? 'done' : 'backlog');
          const statusPill = document.createElement('span');
          statusPill.className = 'pill status-' + (status === 'in_progress' ? 'progress' : status);
          statusPill.textContent = STATUS_LABEL[status] || 'Backlog';
          meta.appendChild(statusPill);

          const rank = todo.rank || 'normal';
          const rankPill = document.createElement('span');
          rankPill.className = 'pill rank-' + rank;
          rankPill.textContent = RANK_LABEL[rank] || 'Normal';
          meta.appendChild(rankPill);

          if (todo.due) {

            sep.className = 'meta-divider';
            sep.textContent = '·';
            meta.appendChild(sep);

            const due = document.createElement('span');
            due.className = 'due-text' + (ds === 'overdue' ? ' overdue' : ds === 'due-soon' ? ' due-soon' : '');
            const prefix = ds === 'overdue' ? 'Overdue · ' : ds === 'due-soon' ? 'Due soon · ' : 'Due ';
            due.textContent = prefix + formatDue(todo.due);
            meta.appendChild(due);

    /* ============ CELEBRATION ============ */
    const Celebration = (() => {
      const overlay = document.getElementById('celebration');
      const closeBtn = document.getElementById('celebrationClose');
      const canvas = document.getElementById('confettiCanvas');
      const ctx = canvas.getContext('2d');
      let W = 0, H = 0;
      let particles = [];
      let running = false;
      let stopAt = 0;

      function sizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function spawn() {
        const colors = ['#a855f7', '#06b6d4', '#facc15', '#ef4444', '#22c55e', '#f97316', '#ec4899', '#3b82f6'];
        particles = [];
        for (let i = 0; i < 220; i++) {
          particles.push({
            x: Math.random() * W,
            y: -Math.random() * H * 0.5,
            vx: (Math.random() - 0.5) * 8,
            vy: 3 + Math.random() * 4,
            r: 4 + Math.random() * 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            angle: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.35,
            shape: Math.random() > 0.5 ? 'rect' : 'circle',
            life: 1
          });
        }
      }

      function loop() {
        if (!running) return;
        ctx.clearRect(0, 0, W, H);
        const fade = Math.max(0, (stopAt - Date.now()) / 1500);
        const fadeAlpha = fade > 1 ? 1 : fade;
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.16;
          p.vx *= 0.992;
          p.angle += p.spin;
          if (p.y > H + 30) continue;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.globalAlpha = fadeAlpha;
          ctx.fillStyle = p.color;
          if (p.shape === 'rect') {
            ctx.fillRect(-p.r * 0.6, -p.r * 0.3, p.r * 1.2, p.r * 0.6);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.r * 0.5, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
        ctx.globalAlpha = 1;
        if (Date.now() < stopAt) {
          requestAnimationFrame(loop);
        } else {
          running = false;
          ctx.clearRect(0, 0, W, H);
        }
      }

      function show() {
        overlay.classList.remove('hidden');
        sizeCanvas();
        spawn();
        running = true;
        stopAt = Date.now() + 7000;
        requestAnimationFrame(loop);
      }
      function hide() {
        overlay.classList.add('hidden');
        running = false;
      }

      closeBtn.addEventListener('click', hide);
      overlay.addEventListener('click', e => { if (e.target === overlay) hide(); });
      window.addEventListener('resize', () => { if (running) sizeCanvas(); });

      return { show, hide };
    })();

      function currentPalette() {

      function init() {
